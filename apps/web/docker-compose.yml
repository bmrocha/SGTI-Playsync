services:
  app:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: playsync_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@playsync_db_player:5432/${POSTGRES_DB:-sgti_playsync}?schema=public
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      playsync_db_player:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/public/uploads
      - ../../.env:/app/apps/web/.env
    networks:
      - playsync-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  playsync_db_player:
    image: postgres:15-alpine
    container_name: playsync_db_player
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
      - POSTGRES_USER=${POSTGRES_USER:-playsync}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin123}
      - POSTGRES_DB=${POSTGRES_DB:-sgti_playsync}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - playsync-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-playsync} -d ${POSTGRES_DB:-sgti_playsync}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  playsync-network:
    driver: bridge
