<svg width="200" height="150" viewBox="0 0 200 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="150" fill="#1e293b"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="200" height="20" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="100" y="14" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">Header / Mensagens</text>

  <!-- Sidebar -->
  <rect x="0" y="20" width="40" height="110" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="20" y="75" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle" transform="rotate(-90 20 75)">Clima</text>

  <!-- Content -->
  <rect x="40" y="20" width="160" height="110" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="120" y="80" font-family="Arial" font-size="12" fill="#94a3b8" text-anchor="middle">Conteúdo</text>

  <!-- Ticker -->
  <rect x="0" y="130" width="200" height="20" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="100" y="144" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">Notícias / RSS</text>
</svg>