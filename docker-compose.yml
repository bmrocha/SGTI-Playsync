services:
  app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: playsync_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # ATENÇÃO: Todas as credenciais devem vir do arquivo .env (env_file acima).
      # NÃO adicione senhas diretamente aqui.
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@playsync_db_player:5432/${POSTGRES_DB}?schema=public
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      playsync_db_player:
        condition: service_healthy
    volumes:
      - ./apps/web/public/uploads:/app/public/uploads
      - ./.env:/app/apps/web/.env
    networks:
      - playsync-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  playsync_db_player:
    image: postgres:15-alpine
    container_name: playsync_db_player
    restart: unless-stopped
    environment:
      # ATENÇÃO: Todas as credenciais devem vir do arquivo .env.
      # Não defina senhas padrão aqui para evitar exposição acidental.
      - TZ=America/Sao_Paulo
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - playsync-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  playsync-network:
    driver: bridge
